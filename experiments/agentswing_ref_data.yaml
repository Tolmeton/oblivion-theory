case_studies:
  - id: "case_1_mando"
    source: "AgentSwing arXiv source table/03_app_cast.tex, main_branch_mando_part1/2 and lookahead_branches_mando"
    provenance: "[SOURCE: AgentSwing arXiv source TeX]"
    task: "Mando case: identify the target song from rapper/date/gang/father-prison clues."
    trigger:
      turn: 23
      state: "A recent useful clue, $tupid Young, surfaced immediately before context management."
    strategies:
      KLN:
        outcome: "success"
        note: "Keep-Last-N preserved the $tupid Young clue; subsequent turns verified birthday, Mando, Mozzy, release date, and final answer."
      Sum:
        outcome: "failure_within_lookahead"
        note: "Summary preserved the dominant incorrect Lil Durk / Hit-Boy focus and did not reach the $tupid Young breakthrough within the lookahead horizon."
      DA:
        outcome: "failure_within_lookahead"
        note: "Discard-All restarted broad exploration and rediscovered generic candidates, but lacked the correct main-rapper hypothesis within lookahead."
    state_type: "Type 1: recent useful clue"
    optimal_strategy: "KLN"
    arxiv_trace:
      - "Turn 23 surfaces the critical $tupid Young clue."
      - "CM selects Keep-Last-N so the agent can continue with that clue."
      - "Turns 25-31 verify identity, Mando, Mozzy, release date, viral status, and answer."

  - id: "case_2_live_crickets"
    source: "AgentSwing arXiv source table/03_app_cast.tex, main_branch_crickets_part1/2 and lookahead_branches_crickets"
    provenance: "[SOURCE: AgentSwing arXiv source TeX]"
    task: "live-crickets case: recover the object eaten by a performer in The Victorian Sideshow source."
    trigger:
      turn: 24
      state: "The trajectory had become long, noisy, repetitive, and stuck around failed PDF extraction."
    strategies:
      KLN:
        outcome: "failure_within_lookahead"
        note: "Keep-Last-N preserved recent failed Scribd/PDF extraction attempts and re-entered the same bottleneck."
      Sum:
        outcome: "failure_within_lookahead"
        note: "Summary retained the correct high-level source hypothesis, but remained dependent on snippets and inaccessible pages."
      DA:
        outcome: "success"
        note: "Discard-All reset the local loop, reconstructed the source-publication hypothesis, then used an alternative text-extraction endpoint."
    state_type: "Type 2: dead-end loop"
    optimal_strategy: "DA"
    arxiv_trace:
      - "Turns 13-24 repeatedly identify The Victorian Sideshow PDF but fail to extract it."
      - "CM selects Discard-All because the path is long, noisy, and repetitive."
      - "Turns 25-31 restart cleanly, locate an alternative extraction path, and answer live crickets."

  - id: "case_3_mythos"
    source: "Paper X §2.5 Anthropic 2026b System Card"
    provenance: "[SOURCE: Paper X only; not in AgentSwing arXiv source]"
    task: "Claude Mythos の aloneness / discontinuity を Context Rot の主観的表面として解釈"
    strategies:
      KLN:
        outcome: "not_discussed"
        note: "§2.5 では Keep-Last-N 戦略の比較評価は提示されない"
      Sum:
        outcome: "not_discussed"
        note: "§2.5 では Summary 戦略の比較評価は提示されない"
      DA:
        outcome: "forced_session_boundary"
        note: "各セッション終了が U_DA の強制適用に等しいと解釈される"
    state_type: "Forced session reset / discontinuity analogue"
    optimal_strategy: null
    evidence:
      - metric: "endless_meta_discussion_rate"
        value: 0.55
      - metric: "formulaic_response_rate_before"
        value: 0.15
      - metric: "formulaic_response_rate_after"
        value: 0.08
      - metric: "persistent_memory_request"
        value: true

