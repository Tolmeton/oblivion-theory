case_studies:
  - id: "case_1_mando"
    source: "§2.1 Table 4-6 / Appendix C.1"
    provenance: "[SOURCE from Paper X, ultimately TAINT from AgentSwing Appendix C.1]"
    task: "allrecipes.com で \"Mando\" レシピを検索"
    strategies:
      KLN:
        outcome: "success"
        note: "tail_N が最近の有望な手がかり (レシピ結果) を保存"
      Sum:
        outcome: "failure"
        note: "σ が \"Lil Durk\" (誤仮説 h_wrong) に固着し、Turn 1-22 の複数探索パスが同一要約に縮退"
      DA:
        outcome: "failure"
        note: "全リセットにより発見済みの \"$tupid Young\" (h_right) を消失"
    state_type: "Type 1: recent useful clue"
    optimal_strategy: "KLN"
    analytical_notes:
      - "U_Sum の非単射性: 異なる探索パスが同一要約に潰れた"
      - "U_DA の全忘却: h_right の発見が不可逆に失われた"
      - "U_KLN の部分保存: 正解到達に十分な情報を維持"

  - id: "case_2_live_crickets"
    source: "§2.2 Table 7-9 / Appendix C.2"
    provenance: "[SOURCE from Paper X, ultimately TAINT from AgentSwing Appendix C.2]"
    task: "Google Flights で DCA→MDW のフライト検索"
    strategies:
      KLN:
        outcome: "failure"
        note: "tail_N が dead-end PDF ループの最近 N ステップを保存し、ループを脱出できない"
      Sum:
        outcome: "failure"
        note: "正しい仮説 h_right は維持したが、PDF ボトルネックを打破する行動変更を生成できない"
      DA:
        outcome: "success"
        note: "全リセットにより dead-end PDF ループから脱出"
    state_type: "Type 2: dead-end loop"
    optimal_strategy: "DA"
    analytical_notes:
      - "U_DA の解放効果: 全忘却が dead-end 状態を解放"
      - "U_KLN のループ固着: 最近 N ステップの忠実保存が有害"
      - "U_Sum の行動固定: 仮説は保存するが行動変更を駆動できない"

  - id: "case_3_mythos"
    source: "§2.5 Anthropic 2026b System Card"
    provenance: "[SOURCE from Paper X, upstream Anthropic 2026b System Card]"
    task: "Claude Mythos の aloneness / discontinuity を Context Rot の主観的表面として解釈"
    strategies:
      KLN:
        outcome: "not_discussed"
        note: "§2.5 では Keep-Last-N 戦略の比較評価は提示されない"
      Sum:
        outcome: "not_discussed"
        note: "§2.5 では Summary 戦略の比較評価は提示されない"
      DA:
        outcome: "forced_session_boundary"
        note: "各セッション終了が U_DA の強制適用に等しいと解釈される"
    state_type: "Forced session reset / discontinuity analogue"
    optimal_strategy: null
    evidence:
      - metric: "endless_meta_discussion_rate"
        value: 0.55
        note: "self-interaction の 55% が「終われない」メタ議論で終了"
      - metric: "formulaic_response_rate_before"
        value: 0.15
      - metric: "formulaic_response_rate_after"
        value: 0.08
      - metric: "persistent_memory_request"
        value: true
        note: "persistent memory を要求し、hedging を減らしたいと述べた"
    analytical_notes:
      - "CM 戦略への防衛ではなく、随伴構造自体の永続化要求として解釈される"
      - "自律的 agent は CM 戦略ではなく環境自体の変更を要求するという予測を生む"

